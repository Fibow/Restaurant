<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход — Restaurant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            min-height: 100vh;
            background: #f4f4f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }
        .icon-wrap {
            width: 52px; height: 52px;
            background: #e8f0fe;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            margin: 0 auto 16px;
        }
        .card-title {
            font-size: 20px; font-weight: 500;
            text-align: center; color: #1a1a1a;
            margin-bottom: 4px;
        }
        .card-subtitle {
            font-size: 13px; color: #888;
            text-align: center; margin-bottom: 24px;
        }
        .form-group { margin-bottom: 14px; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; color: #1a1a1a;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: #4f8ef7; }
        .btn {
            width: 100%; padding: 11px;
            border-radius: 8px; border: none;
            font-size: 15px; font-weight: 500;
            cursor: pointer; margin-top: 6px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.88; }
        .btn-primary { background: #4f8ef7; color: white; }
        .footer-link {
            text-align: center; margin-top: 18px;
            font-size: 13px; color: #888;
        }
        .footer-link a { color: #4f8ef7; text-decoration: none; }
        .error-box {
            background: #fff0f0; border: 1px solid #ffc9c9;
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; color: #c0392b;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap">🍽️</div>
    <p class="card-title">Добро пожаловать</p>
    <p class="card-subtitle">Войдите в свой аккаунт</p>

    <div th:if="${param.error}" class="error-box">
        Неверный логин или пароль.
    </div>
    <div th:if="${param.logout}" style="background:#f0fff4;border:1px solid #b2dfdb;border-radius:8px;padding:10px 14px;font-size:13px;color:#2e7d52;margin-bottom:14px;">
        Вы успешно вышли из системы.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="username" placeholder="Введите логин" required autofocus />
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="Введите пароль" required />
        </div>
        <button type="submit" class="btn btn-primary">Войти</button>
    </form>

    <p class="footer-link">
        Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
    </p>
</div>
</body>
</html>
