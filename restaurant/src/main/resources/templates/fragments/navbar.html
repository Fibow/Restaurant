<nav th:fragment="nav"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     style="background:#333; padding:10px 20px; display:flex; gap:20px; align-items:center;">

    <a th:href="@{/home}" style="color:white; text-decoration:none;">🏠 Главная</a>

    <div sec:authorize="hasRole('ADMIN')" style="display:flex; gap:15px;">
        <a th:href="@{/admin/users}" style="color:#ffc107; text-decoration:none;">👥 Пользователи</a>
        <a th:href="@{/admin/restaurants}" style="color:#ffc107; text-decoration:none;">🏠 Рестораны</a>
        <a th:href="@{/admin/dishes/add}" style="color:#ffc107; text-decoration:none;">🍽️ Добавить блюдо</a>
    </div>

    <div sec:authorize="hasRole('USER')" style="display:flex; gap:15px;">
        <a th:href="@{/menu}" style="color:white; text-decoration:none;">🍴 Меню</a>
        <a th:href="@{/orders/my}" style="color:white; text-decoration:none;">📋 Мои заказы</a>
    </div>

    <div style="margin-left:auto;" sec:authorize="isAuthenticated()">
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:#e74c3c; color:white; border:none; padding:6px 14px; border-radius:4px; cursor:pointer;">
                Выйти
            </button>
        </form>
    </div>

    <div sec:authorize="!isAuthenticated()">
        <a th:href="@{/login}" style="color:white;">Войти</a>
    </div>
</nav>
