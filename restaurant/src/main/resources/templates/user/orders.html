<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои заказы</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-weight: bold; font-size: 0.9em; }
        .status-new { background-color: #ffeeba; color: #856404; }
    </style>
</head>
<body>

<div style="padding: 20px; max-width: 800px; margin: auto;">
    <h2>История моих заказов</h2>
    <a th:href="@{/home}">Вернуться на главную</a> | <a th:href="@{/menu}">Перейти в меню</a>

    <table>
        <thead>
        <tr>
            <th>Номер заказа</th>
            <th>Блюдо</th>
            <th>Цена</th>
            <th>Время заказа</th>
            <th>Статус</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td>
                <ul>
                    <li th:each="item : ${order.items}" th:text="${item.name}"></li>
                </ul>
            </td>
            <td th:text="${order.totalPrice} + ' ₸'"></td>
            <td th:text="${order.status}"></td>
        </tr>
        </tbody>
    </table>

    <div th:if="${orders.empty}" style="margin-top: 20px; color: gray;">
        <p>Вы еще ничего не заказали.</p>
    </div>
</div>

</body>
</html>
