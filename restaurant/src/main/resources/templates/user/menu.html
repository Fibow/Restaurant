<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Меню ресторана</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }

        .page-header {
            padding: 24px 30px 0;
            max-width: 1100px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .page-header h1 { margin: 0; font-size: 24px; color: #1a1a1a; }

        .btn-add {
            background: #28a745; color: white;
            padding: 9px 18px; border-radius: 8px;
            text-decoration: none; font-size: 14px; font-weight: 500;
        }
        .btn-add:hover { background: #218838; }

        .menu-container {
            display: flex; flex-wrap: wrap;
            gap: 20px; padding: 24px 30px;
            max-width: 1100px; margin: auto;
        }

        .dish-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }

        .dish-card h3 {
            margin: 0;
            font-size: 16px;
            color: #1a1a1a;
        }

        .dish-card .description {
            font-size: 13px;
            color: #777;
            flex-grow: 1;
            margin: 0;
        }

        .dish-card .category {
            font-size: 12px;
            background: #e8f0fe;
            color: #1a73e8;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            width: fit-content;
        }

        .dish-card .price {
            font-size: 18px;
            font-weight: 600;
            color: #2e7d32;
            margin: 4px 0 0;
        }

        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 9px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }
        .btn:hover { opacity: 0.88; }

        .btn-order  { background: #007bff; color: white; }
        .btn-edit   { background: #f0f4ff; color: #1a73e8; border: 1px solid #c5d8ff; }
        .btn-delete { background: #fff0f0; color: #c0392b; border: 1px solid #ffc9c9; }

        .admin-actions { display: flex; flex-direction: column; gap: 6px; }

        .empty { padding: 40px; text-align: center; color: #999; font-size: 15px; }
    </style>
</head>
<body>

<nav th:insert="~{fragments/navbar :: nav}"></nav>

<div class="page-header">
    <h1>Наше меню</h1>
    <a sec:authorize="hasRole('ADMIN')"
       th:href="@{/admin/dishes/add}"
       class="btn-add">+ Добавить блюдо</a>
</div>

<div class="menu-container" th:if="${!#lists.isEmpty(MenuItem)}">
    <div class="dish-card" th:each="MenuItem : ${MenuItem}">

        <span class="category" th:text="${MenuItem.category ?: 'Без категории'}"></span>
        <h3 th:text="${MenuItem.name}">Название</h3>
        <p class="description" th:text="${MenuItem.description}">Описание</p>
        <p class="price" th:text="${MenuItem.price} + ' ₸'">Цена</p>

        <div class="card-actions">
            <!-- Кнопка заказа — для всех авторизованных -->
            <form th:action="@{/orders/add}" method="post">
                <input type="hidden" name="itemId" th:value="${MenuItem.id}" />
                <button type="submit" class="btn btn-order">Заказать</button>
            </form>

            <!-- Кнопки админа -->
            <div class="admin-actions" sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/dishes/edit/{id}(id=${MenuItem.id})}"
                   class="btn btn-edit">Редактировать</a>

                <form th:action="@{/admin/dishes/delete/{id}(id=${MenuItem.id})}"
                      method="post"
                      onsubmit="return confirm('Удалить блюдо «' + '[[${MenuItem.name}]]' + '»?')">
                    <button type="submit" class="btn btn-delete">Удалить</button>
                </form>
            </div>
        </div>

    </div>
</div>

<div class="empty" th:if="${#lists.isEmpty(MenuItem)}">
    <p>Меню пока пусто. Зайдите позже!</p>
</div>

</body>
</html>
