<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Аналитика</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
    .content { padding: 30px; max-width: 1000px; margin: auto; }
    h2 { margin-bottom: 24px; }
    h3 { margin: 28px 0 14px; color: #333; }

    /* Карточки метрик */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 8px; }
    .metric-card {
      background: white; border-radius: 10px;
      padding: 20px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .metric-card .value { font-size: 32px; font-weight: 600; color: #333; }
    .metric-card .label { font-size: 13px; color: #888; margin-top: 4px; }

    /* Карточки статусов */
    .statuses { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 8px; }
    .status-card {
      border-radius: 10px; padding: 16px; text-align: center;
    }
    .status-card .count { font-size: 26px; font-weight: 600; }
    .status-card .name  { font-size: 12px; margin-top: 4px; }
    .s-new      { background: #fff3cd; color: #856404; }
    .s-progress { background: #cce5ff; color: #004085; }
    .s-ready    { background: #d4edda; color: #155724; }
    .s-done     { background: #e2e3e5; color: #383d41; }

    /* Таблицы */
    .data-table {
      width: 100%; border-collapse: collapse;
      background: white; border-radius: 10px;
      overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .data-table th, .data-table td {
      padding: 12px 16px; text-align: left;
      border-bottom: 1px solid #eee;
    }
    .data-table th { background: #343a40; color: white; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover { background: #f8f9fa; }

    /* Бар популярности */
    .bar-wrap { background: #eee; border-radius: 4px; height: 8px; margin-top: 4px; }
    .bar-fill  { background: #007bff; border-radius: 4px; height: 8px; }

    .revenue-badge {
      background: #d4edda; color: #155724;
      padding: 3px 10px; border-radius: 12px;
      font-size: 13px; font-weight: 500;
    }
  </style>
</head>
<body>

<nav th:insert="~{fragments/navbar :: nav}"></nav>

<div class="content">
  <h2>📊 Аналитика</h2>

  <div class="metrics">
    <div class="metric-card">
      <div class="value" th:text="${totalOrders}">0</div>
      <div class="label">Всего заказов</div>
    </div>
    <div class="metric-card">
      <div class="value" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' ₸'">0 ₸</div>
      <div class="label">Общая выручка</div>
    </div>
    <div class="metric-card">
      <div class="value" th:text="${totalUsers}">0</div>
      <div class="label">Пользователей</div>
    </div>
    <div class="metric-card">
      <div class="value" th:text="${totalMenuItems}">0</div>
      <div class="label">Блюд в меню</div>
    </div>
  </div>

  <h3>Заказы по статусам</h3>
  <div class="statuses">
    <div class="status-card s-new">
      <div class="count" th:text="${newOrders}">0</div>
      <div class="name">🆕 Новые</div>
    </div>
    <div class="status-card s-progress">
      <div class="count" th:text="${inProgress}">0</div>
      <div class="name">⏳ В работе</div>
    </div>
    <div class="status-card s-ready">
      <div class="count" th:text="${ready}">0</div>
      <div class="name">✅ Готовы</div>
    </div>
    <div class="status-card s-done">
      <div class="count" th:text="${done}">0</div>
      <div class="name">📦 Выданы</div>
    </div>
  </div>

  <h3>Топ-5 популярных блюд</h3>
  <table class="data-table" th:if="${!#maps.isEmpty(topItems)}">
    <thead>
    <tr>
      <th>#</th>
      <th>Блюдо</th>
      <th>Заказов</th>
      <th>Популярность</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry, i : ${topItems}">
      <td th:text="${i.index + 1}"></td>
      <td th:text="${entry.key}"></td>
      <td th:text="${entry.value}"></td>
      <td style="width: 200px;">
        <div class="bar-wrap">
          <div class="bar-fill"
               th:style="'width: ' + (${entry.value * 100 / topItems.values().iterator().next()}) + '%'">
          </div>
        </div>
      </td>
    </tr>
    </tbody>
  </table>
  <p th:if="${#maps.isEmpty(topItems)}" style="color: gray;">Заказов пока нет.</p>

  <h3>Выручка по категориям</h3>
  <table class="data-table" th:if="${!#maps.isEmpty(byCategory)}">
    <thead>
    <tr>
      <th>Категория</th>
      <th>Выручка</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry : ${byCategory}">
      <td th:text="${entry.key}"></td>
      <td>
                    <span class="revenue-badge"
                          th:text="${#numbers.formatDecimal(entry.value, 0, 'COMMA', 0, 'POINT')} + ' ₸'">
                    </span>
      </td>
    </tr>
    </tbody>
  </table>
  <p th:if="${#maps.isEmpty(byCategory)}" style="color: gray;">Данных пока нет.</p>

</div>
</body>
</html>
