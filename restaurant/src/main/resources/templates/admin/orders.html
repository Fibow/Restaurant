<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все заказы</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        .content { padding: 30px; max-width: 1000px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #343a40; color: white; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f8f9fa; }
        .badge {
            display: inline-block; padding: 4px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 500;
        }
        .badge-new      { background: #fff3cd; color: #856404; }
        .badge-progress { background: #cce5ff; color: #004085; }
        .badge-ready    { background: #d4edda; color: #155724; }
        .badge-done     { background: #e2e3e5; color: #383d41; }
        .status-form { display: flex; gap: 6px; align-items: center; }
        select {
            padding: 5px 8px; border-radius: 6px;
            border: 1px solid #ddd; font-size: 13px;
            background: white; cursor: pointer;
        }
        .btn-sm {
            padding: 5px 12px; border-radius: 6px;
            border: none; background: #007bff;
            color: white; font-size: 13px; cursor: pointer;
        }
        .btn-sm:hover { background: #0056b3; }
        h2 { margin-bottom: 20px; }
    </style>
</head>
<body>

<nav th:insert="~{fragments/navbar :: nav}"></nav>

<div class="content">
    <h2>Все заказы</h2>

    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Пользователь</th>
            <th>Блюда</th>
            <th>Сумма</th>
            <th>Время заказа</th>
            <th>Статус</th>
            <th>Изменить статус</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.user != null ? order.user.username : '—'}"></td>
            <td>
                    <span th:each="item, i : ${order.items}">
                        <span th:text="${item.name}"></span>
                        <span th:if="!${i.last}">, </span>
                    </span>
            </td>
            <td th:text="${order.totalPrice} + ' ₸'"></td>
            <td th:text="${order.createdAt != null ?
            #temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm') : '—'}">
            </td>
            <td>
                    <span class="badge"
                          th:classappend="${order.status == 'НОВЫЙ'} ? 'badge-new' :
                                          (${order.status == 'В РАБОТЕ'} ? 'badge-progress' :
                                          (${order.status == 'ГОТОВ'} ? 'badge-ready' : 'badge-done'))"
                          th:text="${order.status}">
                    </span>
            </td>
            <td>
                <form th:action="@{/admin/orders/status/{id}(id=${order.id})}"
                      method="post" class="status-form">
                    <select name="status">
                        <option value="НОВЫЙ"    th:selected="${order.status == 'НОВЫЙ'}">🆕 Новый</option>
                        <option value="В РАБОТЕ" th:selected="${order.status == 'В РАБОТЕ'}">⏳ В работе</option>
                        <option value="ГОТОВ"    th:selected="${order.status == 'ГОТОВ'}">✅ Готов</option>
                        <option value="ВЫДАН"    th:selected="${order.status == 'ВЫДАН'}">📦 Выдан</option>
                    </select>
                    <button type="submit" class="btn-sm">Сохранить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(orders)}" style="margin-top: 20px; color: gray;">
        <p>Заказов пока нет.</p>
    </div>
</div>

</body>
</html>
