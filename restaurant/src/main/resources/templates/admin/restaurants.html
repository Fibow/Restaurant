<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Рестораны</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        .content { padding: 30px; max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #343a40; color: white; }
        tr:hover { background: #f8f9fa; }
        .btn { padding: 7px 14px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.9em; text-decoration: none; }
        .btn-primary { background: #007bff; color: white; display: inline-block; margin-bottom: 16px; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
    </style>
</head>
<body>

<nav th:insert="~{fragments/navbar :: nav}"></nav>

<div class="content">
    <h2>Рестораны</h2>
    <a th:href="@{/admin/restaurants/new}" class="btn btn-primary">+ Добавить ресторан</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Адрес</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${restaurants}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.name}"></td>
            <td th:text="${r.address}"></td>
            <td>
                <form th:action="@{/admin/restaurants/delete/{id}(id=${r.id})}"
                      method="post"
                      onsubmit="return confirm('Удалить ресторан?')"
                      style="display:inline;">
                    <button type="submit" class="btn btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(restaurants)}" style="margin-top:20px; color:gray;">
        <p>Рестораны ещё не добавлены.</p>
    </div>
</div>

</body>
</html>
