<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Создать пользователя</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input, select { padding: 8px; width: 300px; }
    .btn { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

<h2>Добавление нового пользователя</h2>

<div th:if="${errorMessage}" class="alert alert-danger" style="color: red;">
  <p th:text="${errorMessage}"></p>
</div>

<form th:action="@{/admin/create}" th:object="${user}" method="post">
  <div>
    <label>Логин:</label>
    <input type="text" th:field="*{username}" />
    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: red;"></p>
  </div>

  <div>
    <label>Email:</label>
    <input type="email" th:field="*{email}" />
    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></p>
  </div>

  <div>
    <label>Пароль:</label>
    <input type="password" th:field="*{password}" />
    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></p>
  </div>

  <div class="form-group">
    <label>Роль:</label>
    <select th:field="*{role}">
      <option value="USER">Пользователь</option>
      <option value="ADMIN">Администратор</option>
    </select>
  </div>

  <<button type="submit">Создать пользователя</button>
  <a th:href="@{/admin/users}">Назад к списку</a>
</form>

</body>
</html>
