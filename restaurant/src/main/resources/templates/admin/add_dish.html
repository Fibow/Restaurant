<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить блюдо</title>
    <style>
        .form-group { margin-bottom: 15px; }
        .error { color: red; font-size: 0.8em; }
        label { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
<nav th:insert="~{fragments/navbar :: nav}"></nav>  <!-- ← добавь эту строку -->

<h2>Новое блюдо в меню</h2>

<form th:action="@{/admin/dishes/add}" th:object="${MenuItemDto}" method="post">
    <div class="form-group">
        <label>Название:</label>
        <input type="text" th:field="*{name}" />
        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>

    <div class="form-group">
        <label>Описание:</label>
        <label>
            <textarea th:field="*{description}"></textarea>
        </label>
    </div>

    <div class="form-group">
        <label>Цена (₸):</label>
        <input type="number" step="0.01" th:field="*{price}" />
        <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
    </div>

    <div class="form-group">
        <label>Категория:</label>
        <select th:field="*{category}">
            <option value="">-- Выберите --</option>
            <option value="Закуски">Закуски</option>
            <option value="Горячее">Горячее</option>
            <option value="Напитки">Напитки</option>
            <option value="Десерты">Десерты</option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
    </div>

    <button type="submit">Добавить блюдо</button>
</form>

<br>
<a th:href="@{/menu}">Назад к меню</a>
</body>
</html>
