<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Редактировать пользователя</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input, select { padding: 8px; width: 300px; }
    .btn { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

<h2>Редактирование профиля</h2>

<form th:action="@{/admin/edit}" th:object="${user}" method="post">
  <input type="hidden" th:field="*{id}" />

  <div class="form-group">
    <label>Имя пользователя:</label>
    <input type="username" th:field="*{username}" required />
  </div>

  <div class="form-group">
    <label>Электронная почта:</label>
    <input type="email" th:field="*{email}" required />
  </div>

  <div class="form-group">
    <label>Новый пароль (оставьте пустым, если не меняете):</label>
    <input type="password" th:field="*{password}" />
  </div>

  <div class="form-group">
    <label>Роль:</label>
    <select th:field="*{role}">
      <option value="USER">Пользователь</option>
      <option value="ADMIN">Администратор</option>
    </select>
  </div>

  <button type="submit" class="btn">Обновить данные</button>
  <a th:href="@{/admin/users}">Отмена</a>
</form>

</body>
</html>
