<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать блюдо</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; }
        .content { padding: 30px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #555; }
        input, textarea, select { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1em; }
        .error { color: #e74c3c; font-size: 0.85em; margin-top: 4px; }
        .btn { padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer; font-size: 1em; }
        .btn-primary { background: #007bff; color: white; }
        .btn-secondary { background: #6c757d; color: white; text-decoration: none; padding: 10px 20px; border-radius: 4px; }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<nav th:insert="~{fragments/navbar :: nav}"></nav>

<div class="content">
    <div class="card">
        <h2>Редактировать блюдо</h2>

        <form th:action="@{/admin/dishes/edit/{id}(id=${MenuItemDto.id})}"
              th:object="${MenuItemDto}" method="post">

            <div class="form-group">
                <label>Название:</label>
                <input type="text" th:field="*{name}" />
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label>Описание:</label>
                <textarea th:field="*{description}" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Цена (₸):</label>
                <input type="number" step="0.01" th:field="*{price}" />
                <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

            <div class="form-group">
                <label>Категория:</label>
                <select th:field="*{category}">
                    <option value="">-- Выберите --</option>
                    <option value="Закуски">Закуски</option>
                    <option value="Горячее">Горячее</option>
                    <option value="Напитки">Напитки</option>
                    <option value="Десерты">Десерты</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a th:href="@{/menu}" class="btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
